<html lang="fr"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mastercode - Premium PWA Factory</title>
    <style>
        :root { 
            --bg: #1a1c20; --card-bg: #23272d; --shadow: #121417; 
            --light: #2e333a; --accent: #4b6cb7; --text: #e0e0e0;
            --danger: #ff5f56; --success: #27ae60; --warning: #f1c40f;
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); 
            margin: 0; padding: 20px; color: var(--text); display: flex; 
            flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; padding-bottom: 50px; position: relative; }
        h1 { text-align: center; font-size: 1.6rem; font-weight: 300; letter-spacing: 4px; color: #fff; margin-bottom: 30px; text-transform: uppercase; }
        .card { background: var(--card-bg); padding: 22px; border-radius: 24px; box-shadow: 10px 10px 20px var(--shadow), -5px -5px 15px var(--light); margin-bottom: 25px; }
        label { display: block; margin: 0 0 10px 5px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }
        .token-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input, textarea { 
            width: 100%; border: none; padding: 14px; border-radius: 12px; 
            background: #1e2126; color: #fff; box-shadow: inset 4px 4px 8px var(--shadow), inset -2px -2px 6px var(--light); 
            box-sizing: border-box; outline: none; font-size: 1rem;
        }
        .btn-view { padding: 0 15px; border-radius: 12px; border: none; background: var(--card-bg); color: var(--accent); box-shadow: 4px 4px 8px var(--shadow), -2px -2px 6px var(--light); cursor: pointer; font-weight: bold; font-size: 0.7rem; white-space: nowrap; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; background: var(--card-bg); box-shadow: 6px 6px 12px var(--shadow), -4px -4px 10px var(--light); cursor: pointer; font-weight: bold; color: var(--accent); margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 12px; }
        .btn:active { transform: scale(0.98); box-shadow: inset 4px 4px 8px var(--shadow); }
        .btn-danger { color: var(--danger); font-size: 0.7rem; margin-top: 15px; background: transparent; border:none; width: 100%; cursor: pointer; opacity: 0.6; }
        
        .btn-live { 
            width: 100%; padding: 16px; border: 2px solid var(--warning); border-radius: 16px; 
            background: transparent; color: var(--warning); font-weight: bold; cursor: pointer; 
            margin-top: 15px; display: none; justify-content: center; align-items: center; gap: 12px; 
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-live:hover { background: rgba(241, 196, 15, 0.1); }
        .btn-live:active { transform: scale(0.98); }
        
        .led-container { display: flex; gap: 8px; }
        .led { width: 10px; height: 10px; border-radius: 50%; background-color: #555; transition: 0.3s; }
        .led-yellow { background-color: var(--warning); box-shadow: 0 0 10px var(--warning); animation: pulse-yellow 1s infinite; }
        .led-green { background-color: var(--success); box-shadow: 0 0 10px var(--success); animation: none; }
        .led-red { background-color: var(--danger); box-shadow: 0 0 10px var(--danger); animation: none; }

        @keyframes pulse-yellow {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(241, 196, 15, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); }
        }

        #status { margin-top: 25px; font-size: 0.75rem; padding: 18px; border-radius: 15px; display: none; background: #16181c; color: #888; font-family: monospace; border: 1px solid #2e333a; white-space: pre-wrap; line-height: 1.5; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--card-bg); color: var(--success); padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); font-weight: bold; z-index: 1000; transition: top 0.4s; border: 1px solid var(--success); }
        .signature { margin-top: 50px; font-size: 0.7rem; color: #444; letter-spacing: 1.5px; text-align: center; width: 100%; }
        .preview-icon { width: 80px; height: 80px; margin: 15px auto; border-radius: 18px; border: 2px solid var(--light); display: none; object-fit: cover; box-shadow: 4px 4px 10px var(--shadow); }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* STYLES POUR LA MODALE SW */
        #sw-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border: 2px solid var(--warning);
            border-radius: 24px;
            padding: 20px;
            z-index: 10001;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        #sw-modal textarea {
            width: 100%;
            height: 400px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            background: #1e2126;
            color: #eee;
            border: 1px solid #444;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 12px;
        }
        #sw-modal h3 {
            margin-top: 0;
            color: var(--warning);
        }
        .sw-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 15px;
        }
        .sw-buttons button {
            background: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .sw-buttons button.reset {
            background: var(--danger);
        }
        #sw-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
        }
        .sw-btn-icon {
            background: var(--card-bg);
            border: none;
            font-size: 1.4rem;
            padding: 8px 12px;
            border-radius: 30px;
            cursor: pointer;
            margin-left: 10px;
            box-shadow: 4px 4px 8px var(--shadow), -2px -2px 6px var(--light);
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
    </style>

<body>

<div id="toast">✅ Action Réussie</div>

<div class="container">
    <div class="header-row">
        <h1>Mastercode</h1>
        <button class="sw-btn-icon" onclick="openSwModal()" title="Script personnalisé (SW)">🧠 SW</button>
    </div>

    <div class="card">
        <label>GitHub Access Token</label>
        <div class="token-row">
            <input type="password" id="ghToken" placeholder="ghp_..." oninput="saveKey('ghToken', this.value)">
            <button class="btn-view" onclick="toggleView('ghToken')">VOIR</button>
            <button class="btn-view" onclick="pasteToken()">COLLER</button>
        </div>
        <button class="btn-danger" onclick="clearAllData()">🗑️ EFFACER LES CLÉS</button>
    </div>

    <div class="card">
        <label>Nom du Projet</label>
        <input type="text" id="appName" placeholder="ex: master-factory">
        
        <label style="margin-top:20px;">Code HTML Source</label>
        <textarea id="htmlInput" rows="8" placeholder="Colle le code ici..."></textarea>
        
        <label style="margin-top:20px;">Icône PWA (Tous formats acceptés)</label>
        <input type="file" id="iconInput" accept="image/*" onchange="previewIcon(this)">
        <img id="iconPreview" class="preview-icon">
    </div>

    <button class="btn" onclick="generatePWA()" id="mainBtn">
        <div class="spinner" id="loader"></div>
        <span>FORGER L'APPLICATION</span>
    </button>

    <!-- NOUVEAU BOUTON : INJECTER PWA DANS index.html (texte modifié) -->
    <button class="btn" onclick="injectPwaToGitHub()" id="injectBtn">
        <span>Yes, WE Can.</span>
    </button>

    <button class="btn-live" id="liveBtn" onclick="openLiveSite()">
        <div class="led-container">
            <div class="led" id="led1"></div>
            <div class="led" id="led2"></div>
        </div>
        <span>VOIR LE SITE LIVE</span>
    </button>

    <div id="status"></div>
    <button class="btn" onclick="copyReport()" id="copyBtn" style="color: #666; font-size: 0.75rem; display: none; background:none; box-shadow:none;">📋 COPIER LE RAPPORT</button>

    <div class="signature">Made by Laiche Brahim 2026 Paris</div>
</div>

<!-- MODALE SW (SCRIPT PERSONNALISÉ) -->
<div id="sw-overlay"></div>
<div id="sw-modal">
    <h3>✍️ Script personnalisé (JavaScript)</h3>
    <p style="font-size:0.75rem; color:#aaa;">Ce code sera injecté à la fin du &lt;body&gt;. Il peut surcharger les fonctions existantes ou ajouter des fonctionnalités (notifications push, etc.).</p>
    <textarea id="customScript" placeholder="// Collez votre code JS ici...
// Exemple :
// window.showBrowserNotification = function(title, body, tag) { ... }
// console.log('Mon script personnalisé !');"></textarea>
    <div class="sw-buttons">
        <button class="reset" onclick="resetCustomScript()">🗑️ Réinitialiser</button>
        <button onclick="saveCustomScript()">💾 Sauvegarder</button>
        <button onclick="closeSwModal()">Fermer</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    // ---------- GESTION DU SCRIPT PERSONNALISÉ (SW) ----------
    const CUSTOM_SCRIPT_KEY = 'mastercode_custom_script';

    function loadCustomScriptFromStorage() {
        const saved = localStorage.getItem(CUSTOM_SCRIPT_KEY);
        if (saved) {
            document.getElementById('customScript').value = saved;
        }
    }

    function saveCustomScript() {
        const script = document.getElementById('customScript').value;
        localStorage.setItem(CUSTOM_SCRIPT_KEY, script);
        showToast("✅ Script personnalisé sauvegardé !");
        closeSwModal();
    }

    function resetCustomScript() {
        if (confirm("Supprimer définitivement votre script personnalisé ?")) {
            localStorage.removeItem(CUSTOM_SCRIPT_KEY);
            document.getElementById('customScript').value = '';
            showToast("Script personnalisé réinitialisé.");
            closeSwModal();
        }
    }

    function openSwModal() {
        loadCustomScriptFromStorage();
        document.getElementById('sw-modal').style.display = 'block';
        document.getElementById('sw-overlay').style.display = 'block';
    }

    function closeSwModal() {
        document.getElementById('sw-modal').style.display = 'none';
        document.getElementById('sw-overlay').style.display = 'none';
    }

    // ---------- FONCTION D'INJECTION PWA SUR GITHUB (CORRIGÉE) ----------
    async function injectPwaToGitHub() {
        const ghToken = document.getElementById('ghToken').value;
        const appName = document.getElementById('appName').value.trim().replace(/\s+/g, '-');
        const sourceHtml = document.getElementById('htmlInput').value.trim();

        if (!ghToken) {
            showToast("❌ Token GitHub manquant", true);
            return;
        }
        if (!appName) {
            showToast("❌ Nom du projet manquant", true);
            return;
        }
        if (!sourceHtml) {
            showToast("❌ Code HTML source vide. Collez d'abord votre HTML dans le champ prévu.", true);
            return;
        }

        // Récupérer le propriétaire (login) depuis le token
        let owner = "";
        try {
            const userRes = await fetch('https://api.github.com/user', {
                headers: { 'Authorization': `token ${ghToken}` }
            });
            if (!userRes.ok) throw new Error("Token invalide");
            const userData = await userRes.json();
            owner = userData.login;
        } catch (err) {
            showToast("❌ Impossible de vérifier le token GitHub", true);
            return;
        }

        const repo = appName;
        const path = 'index.html';
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

        // Headers pour l'API GitHub
        const headers = {
            'Authorization': `token ${ghToken}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
        };

        // Afficher le bouton live et mettre les LED en jaune (travail en cours)
        const liveBtn = document.getElementById('liveBtn');
        const led1 = document.getElementById('led1');
        const led2 = document.getElementById('led2');
        liveOwner = owner;
        liveRepo = repo;
        liveBtn.style.display = 'flex';
        led1.className = 'led led-yellow';
        led2.className = 'led led-yellow';
        let checkInterval = null;

        try {
            // 1. Récupérer le SHA du fichier distant (indispensable pour la mise à jour)
            updateStatus("🔍 Récupération des infos du fichier distant...", false);
            const getResp = await fetch(url, { headers });
            let sha = null;
            if (getResp.status === 200) {
                const fileData = await getResp.json();
                sha = fileData.sha;
            } else if (getResp.status !== 404) {
                throw new Error(`Impossible d'accéder au fichier (${getResp.status})`);
            }
            // Si le fichier n'existe pas (404), on pourra le créer (PUT sans sha)

            // 2. Injecter les balises PWA dans le code HTML source (local)
            const headElements = `
<link rel="manifest" href="./manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4b6cb7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
`;

            const swScript = `
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker enregistré !'))
        .catch(err => console.error('Erreur SW :', err));
    });
  }
<\/script>
`;

            // Utiliser DOMParser pour une injection propre
            const parser = new DOMParser();
            const doc = parser.parseFromString(sourceHtml, 'text/html');

            // Insertion dans <head>
            if (doc.head) {
                doc.head.insertAdjacentHTML('beforeend', headElements);
            } else {
                doc.documentElement.insertAdjacentHTML('afterbegin', '<head>' + headElements + '</head>');
            }

            // Insertion avant </body>
            if (doc.body) {
                doc.body.insertAdjacentHTML('beforeend', swScript);
            } else {
                doc.documentElement.insertAdjacentHTML('beforeend', '<body>' + swScript + '</body>');
            }

            // Reconstruire la chaîne HTML complète
            let updatedHtml = doc.documentElement.outerHTML;
            if (!sourceHtml.toLowerCase().includes('<!doctype html>')) {
                updatedHtml = '<!DOCTYPE html>\n' + updatedHtml;
            }

            // 3. Encoder en Base64 (UTF-8 sûr)
            const encodedContent = btoa(unescape(encodeURIComponent(updatedHtml)));

            // 4. Envoyer la mise à jour (création ou modification) à GitHub
            updateStatus("📤 Injection des balises PWA et envoi à GitHub...", false);
            const putBody = {
                message: "feat(pwa): injection auto des balises manifest + service worker via Mastercode",
                content: encodedContent
            };
            if (sha) putBody.sha = sha;

            const putResp = await fetch(url, {
                method: 'PUT',
                headers: headers,
                body: JSON.stringify(putBody)
            });

            if (!putResp.ok) {
                const errData = await putResp.json();
                throw new Error(errData.message || "Échec de l'upload");
            }

            updateStatus("✅ index.html mis à jour avec succès sur GitHub !", false);
            showToast("✅ Injection PWA terminée !");

            // 5. Vérifier que le site est déployé (GitHub Pages)
            const siteUrl = `https://${owner.toLowerCase()}.github.io/${repo}/`;
            updateStatus(`🌐 Attente du déploiement sur ${siteUrl}...`, false);
            
            let attempts = 0;
            const maxAttempts = 40; // ~ 2 minutes (3s * 40 = 120s)
            checkInterval = setInterval(async () => {
                attempts++;
                try {
                    const testResp = await fetch(siteUrl, { method: 'HEAD', mode: 'no-cors' });
                    // En mode no-cors, la promesse résout même si la réponse est opaque
                    // On considère que c'est réussi si on n'a pas d'erreur réseau
                    clearInterval(checkInterval);
                    led1.className = 'led led-green';
                    led2.className = 'led led-green';
                    updateStatus("✅ Site prêt et accessible !", false);
                    showToast("🌍 Site disponible !");
                } catch (err) {
                    if (attempts >= maxAttempts) {
                        clearInterval(checkInterval);
                        led1.className = 'led led-green';
                        led2.className = 'led led-green';
                        updateStatus("⚠️ Délai d'attente dépassé, mais le site devrait bientôt être disponible.", false);
                    }
                }
            }, 3000);

        } catch (err) {
            console.error(err);
            updateStatus(`❌ Erreur : ${err.message}`, false);
            showToast(`❌ Échec : ${err.message}`, true);
            led1.className = 'led led-red';
            led2.className = 'led led-red';
            if (checkInterval) clearInterval(checkInterval);
        }
    }

    // ---------- RESTE DE L'APPLICATION (inchangé) ----------
    const saveKey = (id, val) => localStorage.setItem(id, val);
    document.getElementById('ghToken').value = localStorage.getItem('ghToken') || '';

    let liveOwner = "";
    let liveRepo = "";
    let deploymentInterval = null;

    function toggleView(id) {
        const el = document.getElementById(id);
        const btn = event.target;
        if (el.type === "password") { el.type = "text"; btn.innerText = "CACHER"; } 
        else { el.type = "password"; btn.innerText = "VOIR"; }
    }

    async function pasteToken() {
        try {
            const text = await navigator.clipboard.readText();
            const el = document.getElementById('ghToken');
            el.value = text;
            saveKey('ghToken', text);
            showToast("📋 Token collé !");
        } catch (err) {
            showToast("⚠️ Accès au presse-papiers refusé", true);
        }
    }

    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.color = isError ? "var(--danger)" : "var(--success)";
        t.style.borderColor = isError ? "var(--danger)" : "var(--success)";
        t.style.top = "30px";
        setTimeout(() => { t.style.top = "-100px"; }, 4000);
    }

    function clearAllData() {
        if(confirm("Supprimer les clés ?")) { localStorage.clear(); location.reload(); }
    }

    let base64Icon = "";
    function previewIcon(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    canvas.width = 512; 
                    canvas.height = 512;
                    
                    let sourceX = 0, sourceY = 0, sourceWidth = img.width, sourceHeight = img.height;
                    if (img.width > img.height) {
                        sourceWidth = img.height;
                        sourceX = (img.width - img.height) / 2;
                    } else if (img.height > img.width) {
                        sourceHeight = img.width;
                        sourceY = (img.height - img.width) / 2;
                    }
                    
                    ctx.clearRect(0, 0, 512, 512);
                    ctx.drawImage(img, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, 512, 512);
                    
                    const dataUrl = canvas.toDataURL('image/png');
                    base64Icon = dataUrl.split(',')[1];
                    
                    const preview = document.getElementById('iconPreview');
                    preview.src = dataUrl;
                    preview.style.display = 'block';
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateStatus(msg, clear = false) {
        const s = document.getElementById('status');
        s.style.display = 'block';
        document.getElementById('copyBtn').style.display = 'flex';
        if (clear) s.innerHTML = msg; else s.innerHTML += `\n> ${msg}`;
    }

    function copyReport() {
        navigator.clipboard.writeText(document.getElementById('status').innerText);
        showToast("Rapport copié !");
    }

    async function checkDeploymentStatus() {
        const ghToken = document.getElementById('ghToken').value;
        if (!liveOwner || !liveRepo || !ghToken) return;

        try {
            const res = await fetch(`https://api.github.com/repos/${liveOwner}/${liveRepo}/actions/runs?per_page=1`, {
                headers: { 'Authorization': `token ${ghToken}`, 'Accept': 'application/vnd.github+json' }
            });
            if (!res.ok) return;
            
            const data = await res.json();
            if (data.workflow_runs && data.workflow_runs.length > 0) {
                const run = data.workflow_runs[0];
                const l1 = document.getElementById('led1');
                const l2 = document.getElementById('led2');
                
                l1.className = 'led'; l2.className = 'led';

                if (run.status === 'in_progress' || run.status === 'queued') {
                    l1.classList.add('led-yellow'); l2.classList.add('led-yellow');
                } else if (run.status === 'completed') {
                    if (run.conclusion === 'success') {
                        l1.classList.add('led-green'); l2.classList.add('led-green');
                    } else {
                        l1.classList.add('led-red'); l2.classList.add('led-red');
                    }
                }
            }
        } catch (err) {
            console.error("Erreur statut Live :", err);
        }
    }

    function openLiveSite() {
        if (liveOwner && liveRepo) {
            const cleanOwner = liveOwner.toLowerCase();
            window.open(`https://${cleanOwner}.github.io/${liveRepo}/`, '_blank');
        }
    }

    async function generatePWA() {
        const ghToken = document.getElementById('ghToken').value;
        const appName = document.getElementById('appName').value.trim().replace(/\s+/g, '-');
        let htmlInputContent = document.getElementById('htmlInput').value.trim();
        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader');

        if (!ghToken || !appName || !htmlInputContent || !base64Icon) return showToast("⚠️ Données manquantes", true);

        btn.disabled = true; loader.style.display = 'block';
        document.getElementById('liveBtn').style.display = 'none';
        if (deploymentInterval) clearInterval(deploymentInterval);
        
        updateStatus("--- SEQUENCE MASTERCODE 2.9 ACTIVÉE ---", true);

        try {
            const userRes = await fetch('https://api.github.com/user', { headers: { 'Authorization': `token ${ghToken}` } });
            if (!userRes.ok) throw new Error("Accès GitHub refusé");
            const userData = await userRes.json();
            const owner = userData.login;

            const repoCheck = await fetch(`https://api.github.com/repos/${owner}/${appName}`, { headers: { 'Authorization': `token ${ghToken}` } });
            if (repoCheck.status === 404) {
                updateStatus("Création du dépôt...");
                await fetch('https://api.github.com/user/repos', {
                    method: 'POST',
                    headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: appName, auto_init: true })
                });
            }

            updateStatus("Injection du moteur PWA...");
            
            const tagS = '<' + 'script' + '>';
            const tagE = '<' + '/' + 'script' + '>';
            const headE = '<' + '/' + 'head' + '>';
            const bodyE = '<' + '/' + 'body' + '>';
            
            const swReg = `\n${tagS}if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}${tagE}\n`;
            const pwaTags = `\n<link rel="manifest" href="manifest.json">\n<meta name="theme-color" content="#4b6cb7">\n<link rel="apple-touch-icon" href="icon.png">`;

            let finalHtml = htmlInputContent;
            if (finalHtml.toLowerCase().includes(headE)) {
                finalHtml = finalHtml.replace(new RegExp(headE, 'i'), `${pwaTags}${headE}`);
            } else {
                finalHtml = `<head>${pwaTags}</head>` + finalHtml;
            }
            
            // ==== INJECTION DU SCRIPT PERSONNALISÉ (SW) ====
            const customScriptRaw = localStorage.getItem(CUSTOM_SCRIPT_KEY);
            let customScriptBlock = '';
            if (customScriptRaw && customScriptRaw.trim() !== '') {
                customScriptBlock = `\n<!-- Custom script injected by Mastercode -->\n${tagS}\n${customScriptRaw}\n${tagE}\n`;
                updateStatus("Script personnalisé détecté, injection en cours...");
            }
            
            if (finalHtml.toLowerCase().includes(bodyE)) {
                finalHtml = finalHtml.replace(new RegExp(bodyE, 'i'), `${customScriptBlock}${swReg}${bodyE}`);
            } else {
                finalHtml += `${customScriptBlock}${swReg}`;
            }
            // ==================================================

            const manifest = JSON.stringify({
                "name": appName, 
                "short_name": appName, 
                "start_url": "./index.html",
                "display": "standalone", 
                "background_color": "#1a1c20", 
                "theme_color": "#4b6cb7",
                "icons": [{
                    "src": "icon.png", 
                    "sizes": "512x512", 
                    "type": "image/png",
                    "purpose": "any maskable"
                }]
            }, null, 2);

            const sw = `const cacheName='${appName}-v1'; self.addEventListener('install',e=>{e.waitUntil(caches.open(cacheName).then(c=>c.addAll(['./index.html','./manifest.json','./icon.png'])));}); self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;

            const utf8b64 = (s) => btoa(unescape(encodeURIComponent(s)));

            const files = [
                { path: 'index.html', content: utf8b64(finalHtml) },
                { path: 'manifest.json', content: utf8b64(manifest) },
                { path: 'sw.js', content: utf8b64(sw) },
                { path: 'icon.png', content: base64Icon }
            ];

            for (const file of files) {
                updateStatus(`Upload : ${file.path}...`);
                let sha = null;
                const getF = await fetch(`https://api.github.com/repos/${owner}/${appName}/contents/${file.path}`, { headers: { 'Authorization': `token ${ghToken}` } });
                if(getF.status === 200) sha = (await getF.json()).sha;

                await fetch(`https://api.github.com/repos/${owner}/${appName}/contents/${file.path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'Mastercode Sync', content: file.content, sha: sha })
                });
            }

            updateStatus("Activation GitHub Pages...");
            await new Promise(r => setTimeout(r, 3000));
            await fetch(`https://api.github.com/repos/${owner}/${appName}/pages`, {
                method: 'POST',
                headers: { 'Authorization': `token ${ghToken}`, 'Accept': 'application/vnd.github+json' },
                body: JSON.stringify({ source: { branch: 'main', path: '/' } })
            });

            updateStatus("Opération terminée avec succès.");
            showToast("✅ Mastercode : Forgé !");
            
            liveOwner = owner;
            liveRepo = appName;
            
            document.getElementById('led1').className = 'led led-yellow';
            document.getElementById('led2').className = 'led led-yellow';
            document.getElementById('liveBtn').style.display = 'flex';
            
            checkDeploymentStatus();
            deploymentInterval = setInterval(checkDeploymentStatus, 4000);

        } catch (err) {
            updateStatus("❌ ERREUR : " + err.message);
            showToast("Échec de la forge", true);
        } finally {
            btn.disabled = false; loader.style.display = 'none';
        }
    }
</script>
